body:
  text: 南無大慈大悲救苦觀世音唯願聖手摩我頂救護娑婆世界重罪者安著涅槃解脫地每供養諸佛度一切如影隨形願恆受持得不捨離西方阿彌陀佛觀世音菩薩得大勢至菩薩有能誦此一佛二菩薩名者離生死苦永不入地獄恆值善諸識有疑有難者誦此經一千遍即得解脫一願三寶恆存立二願風雨順時行三願國王壽萬歲四願邊地無刀丘五願三塗離苦難六願百病盡消除七願衆生行慈孝八願屠人莫殺生九願牢囚所得脫十願法界普安寧眼願莫見刀光刃耳願不聞怨殃聲口願不用為心語手願不殺一衆生總願當來值彌勒連辟相將入化城
